services:
  fuelaware:
    image: ${FUELAWARE_IMAGE:-ghcr.io/hcuk94/fuelaware:latest}
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}
      AUTH_TRUST_HOST: ${AUTH_TRUST_HOST:-true}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:?set NEXTAUTH_SECRET}
      EMAIL_FROM: ${EMAIL_FROM:-FuelAware <no-reply@example.com>}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      HTTP_PROXY: ${HTTP_PROXY:-${http_proxy:-}}
      HTTPS_PROXY: ${HTTPS_PROXY:-${https_proxy:-}}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@example.com}
      REGISTRATION_ENABLED: ${REGISTRATION_ENABLED:-true}
      DATABASE_FILE_PATH: /app/data/dev.db
      DATABASE_URL: file:/app/data/dev.db
      UK_FUEL_API_URL: ${UK_FUEL_API_URL:-}
      UK_FUEL_API_KEY: ${UK_FUEL_API_KEY:-}
      FRANCE_FUEL_API_URL: ${FRANCE_FUEL_API_URL:-https://data.economie.gouv.fr/api/explore/v2.1/catalog/datasets/prix-des-carburants-en-france-flux-instantane-v2/records?limit=100}
      HTTP_PROXY: ${HTTP_PROXY:-}
      HTTPS_PROXY: ${HTTPS_PROXY:-}
      NO_PROXY: ${NO_PROXY:-}
    volumes:
      - fuelaware-data:/app/data
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:3000/api/health').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))\""]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

volumes:
  fuelaware-data:
